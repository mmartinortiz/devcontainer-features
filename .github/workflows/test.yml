name: Test Features

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON schema
        run: |
          for file in src/*/devcontainer-feature.json; do
            echo "Validating $file"
            jq empty "$file"
          done

      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          for script in src/*/install.sh src/*/test/test.sh scripts/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Checking $script"
              shellcheck "$script"
            fi
          done

  test:
    name: Test Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./test/Dockerfile.test
          push: false
          load: true
          tags: devcontainer-features:test

      - name: Run feature installation and tests
        run: |
          docker run \
            --rm \
            devcontainer-features:test \
            bash -c "
              set -euo pipefail
              echo '=== Running feature install.sh ==='
              cd src/neovim-pack
              bash install.sh
              echo ''
              echo '=== Running feature tests ==='
              bash test/test.sh
            "
