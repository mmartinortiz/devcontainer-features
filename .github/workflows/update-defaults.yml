name: Update Default Versions

on:
  schedule:
    # 1st of each month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch: # allow manual trigger

jobs:
  update-defaults:
    name: Update tool default versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Run update-defaults script
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-defaults.sh

      - name: Bump feature patch version
        if: steps.update.outputs.changes != '0'
        run: |
          cd src/neovim-pack
          current=$(jq -r '.version' devcontainer-feature.json)
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          jq --arg v "$new" '.version = $v' devcontainer-feature.json > tmp.json
          mv tmp.json devcontainer-feature.json
          echo "new_version=${new}" >> "$GITHUB_OUTPUT"

      - name: Commit and create PR
        if: steps.update.outputs.changes != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="auto/update-defaults"
          git checkout -B "$branch"
          git add src/neovim-pack/devcontainer-feature.json
          git commit -m "chore: update default tool versions"
          git push -f origin "$branch"
          gh label create "dependencies" --color "0366d6" --description "Dependency updates" 2>/dev/null || true
          gh label create "automated" --color "ededed" --description "Created by automation" 2>/dev/null || true
          existing=$(gh pr list --head "$branch" --json number -q '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            echo "PR #${existing} already exists, branch updated"
          else
            gh pr create \
              --title "chore: update default tool versions" \
              --body "Automated monthly update of default tool versions in \`devcontainer-feature.json\`.

          Each version is the latest stable release older than 7 days (avoids shipping
          day-zero releases to users who rely on \`latest\`).

          **Review the diff**, merge, and the \`auto-tag\` workflow will create the release tag." \
              --label "dependencies,automated" \
              --assignee "mmartinortiz"
          fi
