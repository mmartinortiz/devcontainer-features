name: Release to GHCR

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Release Features
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "Released version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push neovim-pack feature
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/neovim-pack/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/neovim-pack:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/neovim-pack:${{ steps.version.outputs.major }}
            ${{ env.REGISTRY }}/${{ github.repository }}/neovim-pack:latest

      - name: Create Release Notes
        run: |
          cat > /tmp/release_notes.md << 'EOF'
          # Neovim Pack v${{ steps.version.outputs.version }}
          
          Released at: $(date)
          
          ## Features
          - Neovim
          - ast-grep
          - fzf
          - Prettier
          
          ## Installation
          
          ```json
          {
            "features": {
              "${{ env.REGISTRY }}/${{ github.repository }}/neovim-pack:${{ steps.version.outputs.major }}": {}
            }
          }
          ```
          
          See [README](./src/neovim-pack/README.md) for more details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src/neovim-pack/devcontainer-feature.json
          body_path: /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
